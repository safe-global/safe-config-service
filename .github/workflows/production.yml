# SPDX-License-Identifier: FSL-1.1-MIT
# =============================================================================
# CALLER: GitHub Release → PRODUCTION
# =============================================================================
# Triggered when release-please publishes a GitHub Release (tag vX.Y.Z).
# Runs CI on the release commit, builds an immutable image tagged with the
# release version, then GitOps-deploys it to production with a full health gate:
# ArgoCD wait + smoke test + auto-rollback on failure.
#
# workflow_dispatch is a manual recovery path: it runs THIS (fixed) workflow
# from the default branch while building/deploying the tag you pass as `tag`.
# Use it when a release's own tagged workflow is broken and the release event
# can't be re-run cleanly.
# -----------------------------------------------------------------------------
name: Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag / version to build and deploy (e.g. v2.97.0).
        type: string
        required: true

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/_ci-python.yml
    with:
      mypy_paths: "src/chains src/safe_apps"

  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: [ci, prepare]
    # Build on manual dispatch, or on any non-prerelease GitHub Release.
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    uses: ./.github/workflows/_build-image.yml
    with:
      image_name: ghcr.io/safe-global/safe-config-service
      image_tag: ${{ needs.prepare.outputs.tag }}
      version: ${{ needs.prepare.outputs.tag }}
      also_tag_latest: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
      # On dispatch, build the exact tagged source (not the default branch HEAD).
      ref: ${{ github.event.release.tag_name || inputs.tag }}

  deploy-production:
    needs: [prepare, build]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      image_tag: ${{ needs.prepare.outputs.tag }}
      infra_repo: safe-global/safe-config-service-infra-tf
      values_file: apps/safe-config-service/values-production.yaml
      image_tag_path: .web.imageTag
      argocd_app: safe-config-service
      health_url: https://safe-config.safe.global/check/
      health_gate: true
      post_deploy_checks: |
        curl -fsS https://safe-config.safe.global/api/v1/chains/ | jq -e '.count > 0'
        curl -fsS https://safe-config.safe.global/api/v1/safe-apps/ | jq -e '.count > 0'
    secrets:
      app_id: ${{ secrets.CI_APP_ID }}
      app_private_key: ${{ secrets.CI_APP_PRIVATE_KEY }}
      gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
      argocd_server: ${{ secrets.ARGOCD_SERVER }}
      vpn_secret: ${{ secrets.VPN_SECRET_NAME }}
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      argocd_token_secret: ${{ secrets.ARGOCD_TOKEN_SECRET_NAME }}
