# SPDX-License-Identifier: FSL-1.1-MIT

name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: "Tag version (e.g., v1.2.3). Leave empty to auto-generate."
        required: false
        default: ""
        type: string
      bump_type:
        description: "Version bump type (only used when tag_version is empty)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Checkout reusable workflows
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: safe-global/github-reusable-workflows
          token: ${{ secrets.REUSABLE_WORKFLOWS_TOKEN }}
          path: reusable-workflows
          ref: 716ad3acb8ec684f377da50cc2d77a28351f7adf # v2.4.22

      - name: Create Release
        uses: ./reusable-workflows/actions/create-release
        with:
          token: ${{ github.token }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          tag-version: ${{ inputs.tag_version }}
          bump-type: ${{ inputs.bump_type }}
