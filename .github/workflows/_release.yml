# SPDX-License-Identifier: FSL-1.1-MIT
# =============================================================================
# REUSABLE: Automated release via release-please (replaces manual release.yml)
# =============================================================================
# Runs on every push to main. release-please maintains ONE rolling "Release PR"
# whose version + CHANGELOG are derived from Conventional Commits. Merging that
# PR tags the commit and publishes a GitHub Release.
#
# CRITICAL — the release is created with a GitHub App token, NOT GITHUB_TOKEN:
# a release created by GITHUB_TOKEN does NOT emit a `release: published` event
# (GitHub loop-prevention), so production.yml would never fire. The App token
# makes the event propagate → fully event-driven prod deploy, zero manual steps.
# -----------------------------------------------------------------------------
name: _release

on:
  workflow_call:
    inputs:
      release_type:
        description: release-please release type (python for this repo).
        type: string
        default: python
      auto_merge_release:
        description: >-
          Auto-merge the Release PR so cutting a release (and the prod deploy it
          triggers) needs no second human action. Requires the CI GitHub App to
          be a review-bypass actor on main for its own PRs (see CICD-IMPLEMENTATION.md).
          Set false to make merging the Release PR the deliberate release gate.
        type: boolean
        default: true
    secrets:
      app_id:
        description: GitHub App ID (App installed on this repo, contents+PRs write).
        required: true
      app_private_key:
        description: GitHub App private key (PEM).
        required: true
    outputs:
      release_created:
        description: "'true' when a release was just published (string!)."
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        value: ${{ jobs.release-please.outputs.tag_name }}
      version:
        value: ${{ jobs.release-please.outputs.version }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          release-type: ${{ inputs.release_type }}
          token: ${{ steps.app-token.outputs.token }}

      # When a Release PR is (re)opened, turn on auto-merge so it merges itself
      # once CI is green — no human needed. The merge publishes the Release,
      # which fires production.yml. Feature PRs still require their human review.
      - name: Enable auto-merge on the Release PR
        if: ${{ inputs.auto_merge_release && steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          gh pr merge --auto --squash "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

      # Safety-net for the recurring "stuck Release PR" problem.
      # After publishing the Release, release-please tries to COMMENT on the
      # just-merged Release PR — but this repo locks PRs on merge (org-wide
      # policy), so the comment fails ("issue is locked") and the action aborts
      # BEFORE swapping that PR's label 'autorelease: pending' -> 'autorelease:
      # tagged'. Left pending, the NEXT run retries creating the already-
      # published release (422 already_exists) and no new release can be cut.
      # We swap the label ourselves — editing labels is allowed on a locked PR
      # (only commenting is blocked). Scoped to the single PR that was just
      # released (the one whose squash-merge commit is this run's release SHA),
      # not every pending PR. Idempotent: a no-op if that PR is already tagged.
      - name: Mark the released PR as tagged (workaround for locked-PR comment failure)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASED_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          # The Release PR just merged is the one whose merge commit is the
          # released SHA and still carries the pending label — only touch that one.
          pr=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASED_SHA}/pulls" \
            --jq '.[] | select([.labels[].name] | index("autorelease: pending")) | .number' \
            | head -n1)
          if [ -z "$pr" ]; then
            echo "No merged Release PR on 'autorelease: pending' for ${RELEASED_SHA} — nothing to do."
            exit 0
          fi
          echo "Relabeling Release PR #${pr}: 'autorelease: pending' -> 'autorelease: tagged'"
          gh pr edit "$pr" --repo "${GITHUB_REPOSITORY}" \
            --remove-label "autorelease: pending" \
            --add-label "autorelease: tagged"
