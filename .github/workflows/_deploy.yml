# SPDX-License-Identifier: FSL-1.1-MIT
# =============================================================================
# REUSABLE: GitOps deploy — bump the Helm image tag in the infra repo
# =============================================================================
# The deploy is a PR against the infra repo. This job mints a GitHub App token
# scoped to the separate Terraform/Helm repo, checks it out on a deploy branch,
# rewrites the image tag in the environment's values file, opens a PR, and
# squash-merges it immediately. ArgoCD (watching that repo) reconciles the new
# tag onto the cluster automatically — CI never touches kubectl/helm.
# Each deploy leaves a merged PR in infra-tf, enabling one-click GitHub reverts.
#
# Optional production gate: wait for ArgoCD health + smoke-test the service;
# on failure, `git revert` the bump (ArgoCD rolls back to the previous tag).
# -----------------------------------------------------------------------------
name: _deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (staging | production). Also selects env-scoped secrets.
        type: string
        required: true
      image_tag:
        description: Immutable image tag to deploy (must already be pushed to the registry).
        type: string
        required: true
      infra_repo:
        description: owner/name of the Terraform/Helm/values repo (e.g. safe-global/my-service-infra).
        type: string
        required: true
      values_file:
        description: Path (within infra_repo) to the env values file to bump.
        type: string
        required: true
      image_tag_path:
        description: yq path to the image tag field inside values_file.
        type: string
        default: .image.tag
      argocd_app:
        description: ArgoCD Application name to wait on (optional; production gate).
        type: string
        default: ""
      health_url:
        description: URL to smoke-test after deploy (optional; production gate).
        type: string
        default: ""
      health_gate:
        description: >-
          Enable the full production gate: ArgoCD wait + smoke test + auto-rollback
          on failure. Set true for production only. For staging, set health_url
          without health_gate to get a non-rolling smoke test (no rollback).
        type: boolean
        default: false
      post_deploy_checks:
        description: >-
          Optional bash commands run after the smoke test. Any non-zero exit
          triggers rollback (same as the smoke test). Useful for service-specific
          checks such as API endpoint assertions or DB migration verification.
          Only executed when health_gate is true.
          Example: |
            curl -fsS https://example.com/api/v1/chains/ | jq -e '.count > 0'
            curl -fsS https://example.com/api/v1/safe-apps/ | jq -e '.count > 0'
        type: string
        default: ""
      aws_region:
        description: AWS region for Secrets Manager lookups.
        type: string
        default: "eu-central-1"
    secrets:
      app_id:
        required: true
      app_private_key:
        required: true
      gpg_private_key:
        description: GPG private key for signing the deploy commit (enterprise signed-commits rule).
        required: true
      gpg_passphrase:
        description: Passphrase for the GPG private key.
        required: true
      argocd_server:
        required: false
      argocd_token:
        required: false
      vpn_secret:
        description: AWS Secrets Manager secret name for the OpenVPN config file.
        required: false
      aws_role_arn:
        description: IAM role ARN to assume via OIDC for Secrets Manager access.
        required: false
      argocd_token_secret:
        description: AWS Secrets Manager secret name for the ArgoCD API token.
        required: false

# Serialise deploys per-environment so two pushes can't race the infra repo.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      _HAS_VPN: ${{ secrets.vpn_secret != '' }}
      _HAS_ARN: ${{ secrets.aws_role_arn != '' }}
      _HAS_ARGOCD_SECRET: ${{ secrets.argocd_token_secret != '' }}
    steps:
      - name: Validate AWS inputs
        if: ${{ (env._HAS_VPN == 'true' || env._HAS_ARGOCD_SECRET == 'true') && env._HAS_ARN != 'true' }}
        run: |
          echo "::error::aws_role_arn is required when vpn_secret or argocd_token_secret is set"
          exit 1

      - name: Resolve infra repo name
        id: infra
        env:
          INFRA: ${{ inputs.infra_repo }}
        run: echo "name=${INFRA##*/}" >> "$GITHUB_OUTPUT"

      - name: Mint GitHub App token (scoped to infra repo)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.infra.outputs.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout infra repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.infra_repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: infra
          fetch-depth: 1
          persist-credentials: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.gpg_private_key }}
          passphrase: ${{ secrets.gpg_passphrase }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: 'GH Signer Bot'
          git_committer_email: 'gh-signer-bot@safe.global'

      - name: Bump image tag (yq), open PR & merge
        id: commit
        working-directory: infra
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          VALUES_FILE: ${{ inputs.values_file }}
          TAG_PATH: ${{ inputs.image_tag_path }}
          ENVIRONMENT: ${{ inputs.environment }}
          INFRA_REPO: ${{ inputs.infra_repo }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY##*/}"
          BRANCH="deploy/${ENVIRONMENT}/${REPO}-${IMAGE_TAG}"

          git checkout -b "$BRANCH"
          # mikefarah yq v4 is preinstalled on ubuntu-latest runners.
          yq -i "${TAG_PATH} = strenv(IMAGE_TAG)" "$VALUES_FILE"
          git add "$VALUES_FILE"
          if git diff --cached --quiet; then
            echo "Image tag already ${IMAGE_TAG} — nothing to deploy."
            exit 0
          fi
          git commit -m "deploy(${ENVIRONMENT}): ${REPO} ${IMAGE_TAG}"
          # --force handles re-runs of failed workflows where the branch already exists.
          # Deploy branches are ephemeral and only written by this workflow.
          git push --force origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "deploy(${ENVIRONMENT}): ${REPO} ${IMAGE_TAG}" \
            --body "Automated deploy · [CI run #${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})")

          # --squash produces a single commit on main signed by GitHub web-flow (Verified badge).
          # Retry on conflict: rebase deploy branch on latest infra HEAD and re-attempt.
          for attempt in 1 2 3; do
            if gh pr merge "$PR_URL" --squash --delete-branch \
                 --subject "deploy(${ENVIRONMENT}): ${REPO} ${IMAGE_TAG}" \
                 --body ""; then
              break
            fi
            [ "$attempt" -eq 3 ] && { echo "::error::PR merge failed after 3 attempts."; exit 1; }
            echo "Merge attempt ${attempt} failed — rebasing deploy branch on infra HEAD"
            git fetch origin
            git rebase origin/main || { git rebase --abort; echo "::error::Rebase conflict — manual resolution required. Open PR: ${PR_URL}"; exit 1; }
            git push --force-with-lease origin "$BRANCH"
          done

          # mergeCommit.oid can lag a few seconds after gh pr merge returns.
          MERGE_SHA=""
          for attempt in 1 2 3 4 5; do
            MERGE_SHA=$(gh pr view "$PR_URL" --json mergeCommit --jq '.mergeCommit.oid // empty')
            [ -n "$MERGE_SHA" ] && break
            sleep 2
          done
          if [ -z "$MERGE_SHA" ]; then
            # Fallback: find the commit by title — safe under concurrent unrelated deploys.
            git fetch origin main
            MERGE_SHA=$(git log origin/main --grep "^deploy(${ENVIRONMENT}): ${REPO} ${IMAGE_TAG}$" -n1 --format=%H)
          fi
          if [ -z "$MERGE_SHA" ]; then
            echo "::error::Could not resolve merge SHA — rollback not possible if health gate fails."
            exit 1
          fi
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Deployed ${IMAGE_TAG} to ${ENVIRONMENT} — ${PR_URL}"

      - name: Configure AWS credentials
        if: ${{ env._HAS_ARN == 'true' }}
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Fetch ArgoCD token from Secrets Manager
        if: ${{ env._HAS_ARGOCD_SECRET == 'true' }}
        id: argocd-secrets
        run: |
          set -euo pipefail
          TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id "${{ secrets.argocd_token_secret }}" \
            --query SecretString --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start VPN
        if: ${{ env._HAS_VPN == 'true' }}
        run: |
          set -euo pipefail
          aws secretsmanager get-secret-value \
            --secret-id "${{ secrets.vpn_secret }}" \
            --query SecretString --output text > /tmp/vpn.ovpn
          sudo apt-get update -qq && sudo apt-get install -y -qq openvpn
          sudo openvpn --config /tmp/vpn.ovpn --daemon \
            --log /tmp/openvpn.log --writepid /tmp/openvpn.pid
          for i in $(seq 1 30); do
            grep -q "Initialization Sequence Completed" /tmp/openvpn.log 2>/dev/null && break
            sleep 2
          done
          grep -q "Initialization Sequence Completed" /tmp/openvpn.log \
            || { cat /tmp/openvpn.log; echo "::error::VPN failed to initialize"; exit 1; }

      - name: Wait for ArgoCD sync & health
        if: ${{ inputs.health_gate && inputs.argocd_app != '' }}
        env:
          ARGOCD_SERVER: ${{ secrets.argocd_server }}
          ARGOCD_AUTH_TOKEN: ${{ steps.argocd-secrets.outputs.token || secrets.argocd_token }}
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_SERVER:-}" ] || [ -z "${ARGOCD_AUTH_TOKEN:-}" ]; then
            echo "ArgoCD credentials not provided — skipping explicit wait, relying on smoke test."
            exit 0
          fi
          # Pin the CLI version (don't pull a moving "latest" at runtime).
          ARGOCD_VERSION="v2.13.3"
          curl -sSL -o /tmp/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x /tmp/argocd
          /tmp/argocd app wait "${{ inputs.argocd_app }}" \
            --health --sync --timeout 300 --grpc-web

      - name: Smoke test
        if: ${{ inputs.health_url != '' }}
        run: |
          set -euo pipefail
          curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "${{ inputs.health_url }}"

      - name: Custom post-deploy checks
        if: ${{ inputs.health_gate && inputs.post_deploy_checks != '' }}
        run: |
          set -euo pipefail
          ${{ inputs.post_deploy_checks }}

      - name: Roll back on failed health gate
        if: ${{ failure() && steps.commit.outputs.pushed == 'true' && inputs.health_gate }}
        working-directory: infra
        env:
          DEPLOY_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          set -euo pipefail
          echo "::warning::Health gate failed — reverting ${DEPLOY_SHA}; ArgoCD will roll back."
          # After gh pr merge --delete-branch the working tree is left on the now-deleted
          # deploy branch. Explicitly switch to main before reverting.
          git checkout main
          git pull --rebase origin main
          git revert --no-edit "$DEPLOY_SHA"
          for attempt in 1 2 3; do
            # On success still exit non-zero so the bad release is surfaced as a failure.
            if git push; then exit 1; fi
            echo "rollback push rejected (attempt ${attempt}) — rebasing"
            git pull --rebase
          done
          echo "::error::Rollback push failed after 3 attempts — manual intervention required."
          exit 1

      - name: Stop VPN
        if: ${{ always() && env._HAS_VPN == 'true' }}
        run: |
          [ -f /tmp/openvpn.pid ] && sudo kill "$(cat /tmp/openvpn.pid)" 2>/dev/null || true
          rm -f /tmp/vpn.ovpn /tmp/openvpn.pid /tmp/openvpn.log
